services:
  jamarr_db:
    image: postgres:18.1-alpine
    container_name: jamarr_db
    network_mode: "host"
    command: postgres -p 8110
    restart: unless-stopped
    environment:
      POSTGRES_USER: jamarr
      POSTGRES_PASSWORD: jamarr
      POSTGRES_DB: jamarr
    volumes:
      - ./cache/postgres:/var/lib/postgresql/data

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    network_mode: "host"
    restart: unless-stopped
    environment:
      CB_SERVER_PORT: 8978
    volumes:
      - ./cache/cloudbeaver:/opt/cloudbeaver/workspace

  jamarr:
    build: .
    container_name: jamarr
    network_mode: "host"
    depends_on:
      - jamarr_db
    volumes:
      - type: volume
        source: music
        target: /app/music
        read_only: true
        volume:
          nocopy: true
      - ./cache:/app/cache
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - HOST_IP=REDACTED_IP # Updated to user specified IP
      - HOST_PORT=8111
      # Database connection info (Hardcoded for now as requested)
      - DB_HOST=127.0.0.1
      - DB_PORT=8110
      - DB_USER=jamarr
      - DB_PASS=jamarr
      - DB_NAME=jamarr


volumes:
  music:
    driver_opts:
      type: "nfs"
      o: "addr=REDACTED_IP,nolock,soft,rw"
      device: ":/mnt/tank/music/library"
