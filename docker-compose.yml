services:
  jamarr_db:
    image: postgres:18.1-alpine
    container_name: jamarr_db
    restart: unless-stopped
    ports:
      - "${DB_LISTEN_ADDR:-127.0.0.1}:${DB_PORT:-8110}:${DB_PORT:-8110}"

    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jamarr}
      PGPORT: ${DB_PORT:-8110}

    volumes:
      - ${DB_DATA_PATH:-/mnt/optane-jamarr/jamarr_db}:/var/lib/postgresql


  jamarr:
    build: .
    image: ghcr.io/darious/jamarr:latest
    container_name: jamarr
    network_mode: "host"
    depends_on:
      - jamarr_db
    env_file:
      - .env
    volumes:
      - type: volume
        source: music
        target: /app/music
        read_only: true
        volume:
          nocopy: true
      - type: volume
        source: music_cache
        target: /app/music-cache
        volume:
          nocopy: true
      - ${CACHE_PATH:-/mnt/config/q-jamarr/jamarr}:/app/cache
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    environment:
      HOST: ${HOST:-0.0.0.0}
      HOST_IP: ${HOST_IP:-127.0.0.1}
      HOST_PORT: ${HOST_PORT:-8111}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-8110}
      DB_USER: ${DB_USER:-jamarr}
      DB_PASS: ${DB_PASS:-jamarr}
      DB_NAME: ${DB_NAME:-jamarr}
      JAMARR_STREAM_CACHE_DIR: ${JAMARR_STREAM_CACHE_DIR:-/app/music-cache/cache}


volumes:
  music:
    driver_opts:
      type: "nfs"
      o: "addr=${MUSIC_NFS_ADDR:-REDACTED_IP},nolock,soft,rw"
      device: ":${MUSIC_NFS_PATH:-/mnt/tank/music/library}"
  music_cache:
    driver_opts:
      type: "nfs"
      o: "addr=${MUSIC_NFS_ADDR:-REDACTED_IP},nolock,soft,rw"
      device: ":${MUSIC_CACHE_NFS_PATH:-/mnt/tank/music}"
