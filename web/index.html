<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamarr</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <header>
            <img src="assets/logo.png" alt="Jamarr" class="logo">
            <div class="controls">
                <button id="refresh-meta-btn" style="display: none;">Refresh Metadata</button>
                <button id="scan-btn">Scan Library</button>
            </div>
        </header>
        <div class="main-container">
            <main id="content">
                <div id="az-header" class="az-header">
                    <!-- A-Z links injected here -->
                </div>
                <div id="all-artists-grid" class="artist-grid">
                    <!-- Artists injected here -->
                </div>
                <div id="album-grid">
                    <!-- Albums injected here -->
                </div>
                <div id="track-list" style="display: none;">
                    <div id="album-header">
                        <div id="album-art-container">
                            <img id="album-art-large" src="" alt="Album Art">
                        </div>
                        <div class="album-details">
                            <div id="album-genre" class="meta-line"></div>
                            <h2 id="album-title"></h2>
                            <h3 id="album-artist"></h3>
                            <div id="album-meta" class="meta-line"></div>
                            <div class="album-actions">
                                <button id="play-album-btn" class="icon-btn">▶</button>
                            </div>
                        </div>
                    </div>
                    <ul id="tracks">
                        <!-- Tracks injected here -->
                    </ul>
                </div>

                <div id="artist-details" style="display: none;">
                    <div class="artist-hero">
                        <div class="artist-hero-bg"></div>
                        <div class="artist-hero-content">
                            <div class="artist-image-wrapper">
                                <img id="artist-hero-image" src="" alt="">
                            </div>
                            <div class="artist-hero-info">
                                <h1 id="artist-hero-name"></h1>
                                <p id="artist-hero-bio"></p>
                                <div id="artist-hero-links" class="artist-links"></div>
                            </div>
                        </div>
                    </div>

                    <div class="artist-main-content">
                        <div class="artist-top-tracks">
                            <h3>Most popular</h3>
                            <ul id="top-tracks-list"></ul>
                        </div>

                        <div class="artist-similar">
                            <div class="similar-header">
                                <h3>Similar artists</h3>
                            </div>
                            <div id="similar-artists-grid"></div>
                        </div>
                    </div>

                    <div class="artist-albums-section">
                        <div id="artist-albums-grid" class="album-grid"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Player Bar -->
    <div id="player-bar" class="player-bar" style="display: none;">
        <div class="player-progress-container" id="progress-container">
            <div class="player-progress-bar" id="progress-bar"></div>
        </div>
        <div class="player-controls-row">
            <!-- Left: Metadata -->
            <div class="player-meta">
                <img id="player-art" src="" alt="Art">
                <div class="player-meta-text">
                    <div id="player-title" class="player-title"></div>
                    <div id="player-artist" class="player-artist"></div>
                </div>
                <button class="player-icon-btn small">⋮</button>
            </div>

            <!-- Center: Controls -->
            <div class="player-center">
                <div class="player-time-info">
                    <span id="player-time-current">00:00</span>
                    <span class="time-separator">/</span>
                    <span id="player-time-total">00:00</span>
                </div>
                <div class="player-main-controls">
                    <button class="player-icon-btn" id="prev-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                        </svg>
                    </button>
                    <button class="player-icon-btn play-pause" id="play-pause-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <button class="player-icon-btn" id="next-btn">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Right: Volume/Tech -->
            <div class="player-right">
                <div class="player-tech-info">
                    <span class="tech-icon">◎</span>
                    <div class="tech-text">
                        <div id="player-tech-format">FLAC</div>
                        <div id="player-tech-details">44.1kHz • 16bit</div>
                    </div>
                </div>

                <div class="volume-control">
                    <button class="player-icon-btn small" id="mute-btn">🔊</button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                </div>

                <button class="player-icon-btn close-btn" id="close-player-btn">✕</button>
            </div>
        </div>
    </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
