name: Android Build

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/android_build.yml"
      - "android/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android_build.yml"
      - "android/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-api36-v2

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Lint, unit tests, and build
        run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug
