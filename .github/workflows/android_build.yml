name: Android Build

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/android_build.yml"
      - "android/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android_build.yml"
      - "android/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept SDK licenses
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

      - name: Install SDK packages
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Lint, unit tests, and build
        run: ./gradlew --no-daemon --stacktrace lintDebug testDebugUnitTest assembleDebug
