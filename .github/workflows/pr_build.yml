name: Build

permissions:
  contents: read

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/pr_build.yml"
      - "web/**"
      - "docker-compose.test.yml"
      - "Dockerfile.node-ci"
      - "scripts/test-build.sh"
  
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Create dummy .env
        run: |
          cat <<EOF > .env
          POSTGRES_USER=jamarr
          POSTGRES_PASSWORD=jamarr_secret
          DB_USER=jamarr
          DB_PASS=jamarr_secret
          TEST_DB_USER=jamarr_test
          TEST_DB_PASSWORD=jamarr_test_secret
          EOF

      - name: Make scripts executable
        run: chmod +x scripts/test-build.sh

      - name: Run Production Build
        run: ./scripts/test-build.sh
