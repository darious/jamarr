name: Deploy jamarr to q-docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: REDACTED_IP
      TARGET_USER: root
      TARGET_DIR: /root/jamarr

    steps:
    - name: Connect WireGuard
      uses: darious/shared-actions/wireguard/connect@main
      with:
        config: ${{ secrets.WIREGUARD_CONFIG }}
        target-host: ${{ env.TARGET_HOST }}
        debug: "true"
        traceroute: "true"

    - name: Run deployment on server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        JAMARR_ENV: ${{ secrets.JAMARR_ENV }}
      run: |
        set -euo pipefail

        mkdir -p ~/.ssh
        echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts

        # We explicitly export the variables before starting the remote bash session
        ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 "$TARGET_USER@$TARGET_HOST" \
          "export TARGET_DIR='$TARGET_DIR'; export JAMARR_ENV_VAL='${JAMARR_ENV}'; bash -s" <<'EOF'
            set -euo pipefail

            # 1. Update/Clone Repo
            if [ -d "$TARGET_DIR/.git" ]; then
                echo "Updating existing repository..."
                cd "$TARGET_DIR"
                git pull --rebase
            else
                echo "Cloning fresh repository..."
                git clone git@github.com:darious/jamarr.git "$TARGET_DIR"
                cd "$TARGET_DIR"
            fi

            # 2. Update Environment Secrets
            printf '%s' "$JAMARR_ENV_VAL" > .env
            chmod 600 .env

            # 3. Run the optimized update script
            chmod +x update.sh
            ./update.sh
        EOF

    - name: Disconnect WireGuard
      if: always()
      uses: darious/shared-actions/wireguard/disconnect@main

    - name: Cleanup secrets
      if: always()
      run: rm -f ~/.ssh/id_rsa || true
