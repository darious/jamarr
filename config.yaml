music_path: "/app/music/"

musicbrainz:
  root_url: "https://musicbrainz.org"
  rate_limit: "none"

qobuz:
  region: "gb-en"

logging:
  level: "INFO"
  rotation:
    max_bytes: 10485760 # 10MB
    backup_count: 5

# Scanner concurrency
max_workers: 16

# UPnP renderers fetch streams/art via a header-recasing proxy on this port
# (uvicorn lowercases response headers; some renderers need canonical casing).
# Env override: RENDERER_PROXY_PORT.
renderer:
  stream_proxy_port: 8112

pearlarr: {}
