services:
  jamarr_test_db:
    image: postgres:18.1-alpine
    ports:
      - "127.0.0.1:8109:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${TEST_DB_USER}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME:-jamarr_test}
    # No persistent volume needed - we want it fresh every time, 
    # but kept alive if tests fail for debugging.
    restart: no

  jamarr_test_runner:
    build: .
    depends_on:
      - jamarr_test_db
    env_file:
      - .env
    environment:
      DB_HOST: jamarr_test_db
      DB_PORT: 5432
      DB_USER: ${TEST_DB_USER}
      DB_PASS: ${TEST_DB_PASSWORD}
      DB_NAME: jamarr_test
    working_dir: /app
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./config.yaml:/app/config.yaml
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock

  jamarr_test_web:
    build:
      context: .
      dockerfile: Dockerfile.node-ci
    image: jamarr-node-ci
    pull_policy: build
    working_dir: /app/web
    volumes:
      - ./web:/app/web
      - jamarr_test_web_node_modules:/app/web/node_modules

volumes:
  jamarr_test_web_node_modules:
