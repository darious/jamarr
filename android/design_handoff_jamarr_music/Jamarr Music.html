<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jamarr Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c0c; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Design tokens ──────────────────────────────────────────────────────────
const C = {
  bg:      '#150808',
  surface: '#1e0e0e',
  card:    '#261212',
  primary: '#FF2D55',
  tertiary:'#00996E',
  text:    '#FFCDD2',
  muted:   '#A1A1A2',
  neutral: '#8B7171',
  border:  '#2e1818',
};

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : n;

function AlbumArt({ album, size = 120, style = {} }) {
  const colors = album?.color ? [album.color, '#150808'] : ['#261212', '#150808'];
  return (
    <div style={{
      width: size, height: size, borderRadius: 6, flexShrink: 0,
      background: `linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%)`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.18, color: C.neutral, fontWeight: 600,
      letterSpacing: '-0.02em', textAlign: 'center', padding: 6,
      ...style
    }}>
      {album?.title?.split(' ').slice(0,2).map(w => w[0]).join('') || '??'}
    </div>
  );
}

function ArtistArt({ artist, size = 56, style = {} }) {
  const hue = artist?.name?.charCodeAt(0) % 360 || 0;
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: `conic-gradient(from ${hue}deg, #FF2D5533, #00996E33, #FF2D5533)`,
      border: `1.5px solid ${C.border}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.32, color: C.text, fontWeight: 700,
      ...style
    }}>
      {artist?.name?.[0] || '?'}
    </div>
  );
}

function Pill({ children, active, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
      fontSize: 12, fontWeight: 500, fontFamily: 'Inter',
      background: active ? C.primary : C.card,
      color: active ? '#fff' : C.muted,
      flexShrink: 0,
      transition: 'all 0.15s',
      ...style
    }}>{children}</button>
  );
}

function SectionHeader({ title, onMore }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
      <span style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{title}</span>
      {onMore && <button onClick={onMore} style={{ background: 'none', border: 'none', color: C.primary, fontSize: 12, cursor: 'pointer', fontFamily: 'Inter' }}>See all</button>}
    </div>
  );
}

function PlayButton({ size = 44, style = {} }) {
  const [playing, setPlaying] = useState(false);
  return (
    <button onClick={() => setPlaying(p => !p)} style={{
      width: size, height: size, borderRadius: '50%', border: 'none',
      background: C.primary, cursor: 'pointer', display: 'flex',
      alignItems: 'center', justifyContent: 'center', flexShrink: 0,
      boxShadow: `0 4px 16px ${C.primary}55`, ...style
    }}>
      {playing
        ? <svg width={size*0.4} height={size*0.4} viewBox="0 0 16 16" fill="white"><rect x="2" y="2" width="4" height="12"/><rect x="10" y="2" width="4" height="12"/></svg>
        : <svg width={size*0.4} height={size*0.4} viewBox="0 0 16 16" fill="white"><polygon points="4,2 14,8 4,14"/></svg>
      }
    </button>
  );
}

// ── ICON SET ───────────────────────────────────────────────────────────────
const Icon = {
  Home: ({size=22,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><path d="M9 21V12h6v9"/></svg>,
  Chart: ({size=22,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  History: ({size=22,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>,
  Playlist: ({size=22,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill={color}/><circle cx="3" cy="12" r="1" fill={color}/><circle cx="3" cy="18" r="1" fill={color}/></svg>,
  Search: ({size=18,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  SortAZ: ({size=16,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l4-4 4 4M7 5v14M21 15l-4 4-4-4M17 19V5"/></svg>,
  Back: ({size=20,color=C.text}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  Play: ({size=18,color='white'}) => <svg width={size} height={size} viewBox="0 0 24 24" fill={color}><polygon points="5,3 19,12 5,21"/></svg>,
  Dot: ({size=4,color=C.muted}) => <div style={{width:size,height:size,borderRadius:'50%',background:color}}/>,
  ChevDown: ({size=16,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>,
  ChevUp: ({size=16,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><polyline points="18 15 12 9 6 15"/></svg>,
  Music: ({size=16,color=C.muted}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
  Up: ({size=12,color='#00996E'}) => <svg width={size} height={size} viewBox="0 0 12 12" fill={color}><path d="M6 1l4 5H2z"/></svg>,
  Down: ({size=12,color=C.primary}) => <svg width={size} height={size} viewBox="0 0 12 12" fill={color}><path d="M6 11l4-5H2z"/></svg>,
};

// ── HOME SCREEN ────────────────────────────────────────────────────────────
function HomeScreen({ navigate }) {
  const D = window.MOCK_DATA;
  const [query, setQuery] = useState('');
  const newReleases = D.albums.slice(0, 6);
  const recentAlbums = D.albums.slice(2, 8);
  const playedAlbums = D.albums.slice(1, 7);
  const artists = D.artists.slice(0, 6);

  const q = query.trim().toLowerCase();
  const searchResults = q.length > 0 ? [
    ...D.albums.filter(a => a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q)).map(a => ({ type: 'album', data: a })),
    ...D.artists.filter(a => a.name.toLowerCase().includes(q)).map(a => ({ type: 'artist', data: a })),
  ] : [];

  const HScroll = ({ children }) => (
    <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 4, scrollbarWidth: 'none' }}>
      {children}
    </div>
  );

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '12px 16px 80px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14, paddingTop: 4 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700, color: C.text }}>Good evening</div>
          <div style={{ fontSize: 13, color: C.muted }}>What's in your library?</div>
        </div>
        <div style={{ width: 36, height: 36, borderRadius: '50%', background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: 'white' }}>J</div>
      </div>

      {/* Search */}
      <div style={{ position: 'relative', marginBottom: 20 }}>
        <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }}>
          <Icon.Search size={16} color={C.neutral} />
        </div>
        <input
          value={query} onChange={e => setQuery(e.target.value)}
          placeholder="Search albums, artists…"
          style={{ width: '100%', background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: '10px 12px 10px 36px', color: C.text, fontSize: 13, fontFamily: 'Inter', outline: 'none' }}
        />
        {query && <button onClick={() => setQuery('')} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 16, lineHeight: 1 }}>×</button>}
      </div>

      {/* Search results */}
      {searchResults.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <SectionHeader title={`${searchResults.length} result${searchResults.length !== 1 ? 's' : ''}`} />
          {searchResults.map((r, i) => r.type === 'album' ? (
            <div key={i} onClick={() => navigate('album', r.data)} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}>
              <AlbumArt album={r.data} size={44} style={{ borderRadius: 5 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.data.title}</div>
                <div style={{ fontSize: 11, color: C.muted }}>{r.data.artist} · Album</div>
              </div>
            </div>
          ) : (
            <div key={i} onClick={() => navigate('artist', r.data)} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: `1px solid ${C.border}`, cursor: 'pointer' }}>
              <ArtistArt artist={r.data} size={44} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{r.data.name}</div>
                <div style={{ fontSize: 11, color: C.muted }}>{r.data.genre} · Artist</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Hide sections when searching */}
      {!q && <>
      

      {/* New Releases */}
      <div style={{ marginBottom: 24 }}>
        <SectionHeader title="New Releases" />
        <HScroll>
          {newReleases.map(al => (
            <div key={al.id} onClick={() => navigate('album', al)} style={{ cursor: 'pointer', flexShrink: 0 }}>
              <AlbumArt album={al} size={130} />
              <div style={{ marginTop: 6, width: 130 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{al.title}</div>
                <div style={{ fontSize: 11, color: C.muted }}>{al.artist}</div>
              </div>
            </div>
          ))}
        </HScroll>
      </div>

      {/* Recently Added Albums */}
      <div style={{ marginBottom: 24 }}>
        <SectionHeader title="Recently Added" />
        <HScroll>
          {recentAlbums.map(al => (
            <div key={al.id} onClick={() => navigate('album', al)} style={{ cursor: 'pointer', flexShrink: 0 }}>
              <AlbumArt album={al} size={100} />
              <div style={{ marginTop: 6, width: 100 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{al.title}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{al.artist}</div>
              </div>
            </div>
          ))}
        </HScroll>
      </div>

      {/* Recently Played Albums */}
      <div style={{ marginBottom: 24 }}>
        <SectionHeader title="Recently Played" />
        <HScroll>
          {playedAlbums.map(al => (
            <div key={al.id} onClick={() => navigate('album', al)} style={{ cursor: 'pointer', flexShrink: 0 }}>
              <AlbumArt album={al} size={100} />
              <div style={{ marginTop: 6, width: 100 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{al.title}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{al.artist}</div>
              </div>
            </div>
          ))}
        </HScroll>
      </div>

      {/* Artists */}
      <div style={{ marginBottom: 24 }}>
        <SectionHeader title="Artists" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          {artists.map(ar => (
            <div key={ar.id} onClick={() => navigate('artist', ar)} style={{
              display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
              background: C.card, borderRadius: 10, padding: '8px 10px',
              border: `1px solid ${C.border}`
            }}>
              <ArtistArt artist={ar} size={40} />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ar.name}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{fmt(ar.scrobbles)} plays</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      </>}
    </div>
  );
}

// ── ARTIST SCREEN ──────────────────────────────────────────────────────────
function ArtistScreen({ artist, navigate, goBack }) {
  const D = window.MOCK_DATA;
  const [linksOpen, setLinksOpen] = useState(false);
  const [tracksTab, setTracksTab] = useState('scrobbled');
  const [discoTab, setDiscoTab] = useState('albums');

  const artistAlbums = D.albums.filter(al => al.artistId === artist.id);
  const discoTypes = { albums: 'album', compilations: 'compilation', live: 'live', eps: 'ep', singles: 'single', 'appears on': 'appears' };
  const filteredDisco = artistAlbums.filter(al => al.type === discoTypes[discoTab]) ;
  const discoShow = filteredDisco.length > 0 ? filteredDisco : artistAlbums.slice(0, 3);

  const tracks = D.tracks[artist.id] || [];
  const sortedTracks = [...tracks].sort((a, b) =>
    tracksTab === 'scrobbled' ? b.scrobbles - a.scrobbles :
    tracksTab === 'listened' ? b.listens - a.listens :
    a.title.localeCompare(b.title)
  );

  const similarIds = D.similarArtists[artist.id] || [];
  const similarArtists = D.artists.filter(a => similarIds.includes(a.id));

  const links = ['Last.fm', 'MusicBrainz', 'Bandcamp', 'Wikipedia', 'Discogs', 'AllMusic'];

  return (
    <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 80 }}>
      {/* Hero */}
      <div style={{ position: 'relative', height: 200, background: `conic-gradient(from ${artist.name.charCodeAt(0)*7}deg at 30% 50%, #FF2D5522, #00996E33, #FF2D5511)`, borderBottom: `1px solid ${C.border}` }}>
        <button onClick={goBack} style={{ position: 'absolute', top: 12, left: 12, background: '#00000066', border: 'none', borderRadius: '50%', width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
          <Icon.Back />
        </button>
        <div style={{ position: 'absolute', bottom: 16, left: 16, right: 16 }}>
          <div style={{ fontSize: 26, fontWeight: 700, color: C.text }}>{artist.name}</div>
          <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{artist.genre} · {fmt(artist.scrobbles)} plays</div>
        </div>
        <PlayButton size={44} style={{ position: 'absolute', bottom: 16, right: 16 }} />
      </div>

      {/* Links dropdown */}
      <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}` }}>
        <button onClick={() => setLinksOpen(o => !o)} style={{
          display: 'flex', alignItems: 'center', gap: 6, background: C.card,
          border: `1px solid ${C.border}`, borderRadius: 8, padding: '8px 14px',
          cursor: 'pointer', color: C.text, fontSize: 13, fontWeight: 500, fontFamily: 'Inter'
        }}>
          <Icon.Music size={14} color={C.tertiary} />
          Links
          {linksOpen ? <Icon.ChevUp size={14} color={C.muted} /> : <Icon.ChevDown size={14} color={C.muted} />}
        </button>
        {linksOpen && (
          <div style={{ marginTop: 8, background: C.card, borderRadius: 10, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
            {links.map((l, i) => (
              <div key={l} style={{
                padding: '10px 14px', fontSize: 13, color: C.primary, fontWeight: 500,
                borderBottom: i < links.length - 1 ? `1px solid ${C.border}` : 'none',
                cursor: 'pointer'
              }}>{l}</div>
            ))}
          </div>
        )}
      </div>

      <div style={{ padding: '0 16px' }}>
        {/* Top Tracks */}
        <div style={{ marginTop: 20, marginBottom: 24 }}>
          <SectionHeader title="Top Tracks" />
          <div style={{ display: 'flex', gap: 8, marginBottom: 12, overflowX: 'auto', scrollbarWidth: 'none' }}>
            {[['scrobbled','Most Scrobbled'],['listened','Most Listened'],['singles','Singles']].map(([k,l]) => (
              <Pill key={k} active={tracksTab===k} onClick={() => setTracksTab(k)}>{l}</Pill>
            ))}
          </div>
          {sortedTracks.slice(0,6).map((t, i) => (
            <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: `1px solid ${C.border}` }}>
              <span style={{ width: 18, textAlign: 'right', fontSize: 12, color: C.neutral }}>{i+1}</span>
              <AlbumArt album={D.albums.find(a=>a.id===t.albumId)} size={38} style={{ borderRadius: 4 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</div>
                <div style={{ fontSize: 11, color: C.muted }}>{t.album}</div>
              </div>
              <div style={{ textAlign: 'right', flexShrink: 0 }}>
                <div style={{ fontSize: 11, color: C.muted }}>{fmt(tracksTab==='listened'?t.listens:t.scrobbles)}</div>
                <div style={{ fontSize: 10, color: C.neutral }}>{t.duration}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Discography */}
        <div style={{ marginBottom: 24 }}>
          <SectionHeader title="Discography" />
          <div style={{ display: 'flex', gap: 6, marginBottom: 14, overflowX: 'auto', scrollbarWidth: 'none' }}>
            {Object.keys(discoTypes).map(k => (
              <Pill key={k} active={discoTab===k} onClick={() => setDiscoTab(k)} style={{ textTransform: 'capitalize' }}>{k}</Pill>
            ))}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {discoShow.map(al => (
              <div key={al.id} onClick={() => navigate('album', al)} style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', padding: '4px 0' }}>
                <AlbumArt album={al} size={52} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{al.title}</div>
                  <div style={{ fontSize: 11, color: C.muted }}>{al.year} · {al.tracks} tracks</div>
                </div>
                <Icon.ChevDown size={14} color={C.neutral} />
              </div>
            ))}
          </div>
        </div>

        {/* Similar Artists */}
        {similarArtists.length > 0 && (
          <div style={{ marginBottom: 24 }}>
            <SectionHeader title="Similar Artists" />
            <div style={{ display: 'flex', gap: 14, overflowX: 'auto', scrollbarWidth: 'none' }}>
              {similarArtists.map(ar => (
                <div key={ar.id} onClick={() => navigate('artist', ar)} style={{ flexShrink: 0, textAlign: 'center', cursor: 'pointer' }}>
                  <ArtistArt artist={ar} size={64} />
                  <div style={{ fontSize: 11, fontWeight: 500, color: C.text, marginTop: 6, width: 64, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ar.name}</div>
                  <div style={{ fontSize: 10, color: C.muted }}>{ar.genre}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ALBUM SCREEN ───────────────────────────────────────────────────────────
function AlbumScreen({ album, navigate, goBack }) {
  const D = window.MOCK_DATA;
  const artist = D.artists.find(a => a.id === album.artistId);
  const tracks = D.albumTracks[album.id] || Array.from({length: album.tracks}, (_, i) => ({
    n: i+1, title: `Track ${i+1}`, duration: `${3+Math.floor(Math.random()*3)}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`, scrobbles: Math.floor(Math.random()*300)+50
  }));
  const totalDuration = tracks.length * 4.5;
  const [playingIdx, setPlayingIdx] = useState(null);

  return (
    <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 80 }}>
      {/* Hero */}
      <div style={{ position: 'relative', background: `linear-gradient(180deg, ${album.color || '#261212'} 0%, ${C.bg} 100%)`, padding: '0 0 20px' }}>

// ── PLAYLISTS LIST SCREEN ──────────────────────────────────────────────────
function PlaylistsScreen({ navigate }) {
  const D = window.MOCK_DATA;
  const [sort, setSort] = useState('updated');

  const sorted = [...D.playlists].sort((a, b) =>
    sort === 'name' ? a.name.localeCompare(b.name) : b.updatedAt.localeCompare(a.updatedAt)
  );

  const fmtDate = d => {
    const days = Math.floor((new Date() - new Date(d)) / 86400000);
    if (days === 0) return 'Today';
    if (days === 1) return 'Yesterday';
    if (days < 7) return `${days} days ago`;
    return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '12px 16px 80px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>

      <div style={{ fontSize: 13, color: C.muted, marginBottom: 16 }}>{D.playlists.length} playlists</div>

// ── ROOT APP ───────────────────────────────────────────────────────────────
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('jamarr_nav') || '{}'); } catch { return {}; } })();
  const safeTab = ['home','charts','history','playlists'].includes(saved.tab) ? saved.tab : 'home';
  const [screen, setScreen] = useState(safeTab);
  const [stack, setStack] = useState([]);
  const [activeTab, setActiveTab] = useState(safeTab);
  const [detailData, setDetailData] = useState(null);

  useEffect(() => {
    localStorage.setItem('jamarr_nav', JSON.stringify({ screen, tab: activeTab }));
  }, [screen, activeTab]);

  const navigate = (type, data) => {
    setStack(s => [...s, { screen, detailData }]);
    setScreen(type);
    setDetailData(data);
  };

  const goBack = () => {
    const prev = stack[stack.length - 1];
    if (prev) {
      setScreen(prev.screen);
      setDetailData(prev.detailData);
      setStack(s => s.slice(0, -1));
    }
  };

  const selectTab = (tab) => {
    setActiveTab(tab);
    setScreen(tab);
    setStack([]);
    setDetailData(null);
  };

  const renderScreen = () => {
    if (screen === 'artist') return <ArtistScreen artist={detailData} navigate={navigate} goBack={goBack} />;
    if (screen === 'album') return <AlbumScreen album={detailData} navigate={navigate} goBack={goBack} />;
    if (screen === 'playlist') return <PlaylistScreen playlist={detailData} goBack={goBack} />;
    if (screen === 'charts') return <ChartsScreen navigate={navigate} />;
    if (screen === 'history') return <HistoryScreen navigate={navigate} />;
    if (screen === 'playlists') return <PlaylistsScreen navigate={navigate} />;
    return <HomeScreen navigate={navigate} />;
  };

  const isDetail = screen === 'artist' || screen === 'album' || screen === 'playlist';

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: C.bg, position: 'relative', fontFamily: 'Inter', color: C.text, overflow: 'hidden' }}>
      {renderScreen()}
      <MiniPlayer />
      {!isDetail && <BottomNav active={activeTab} onSelect={selectTab} />}
      {isDetail && (
        <div style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: '10px 0 8px', display: 'flex', justifyContent: 'center' }}>
          <button onClick={goBack} style={{ background: 'none', border: 'none', color: C.muted, fontSize: 12, cursor: 'pointer', fontFamily: 'Inter', display: 'flex', alignItems: 'center', gap: 4 }}>
            <Icon.Back size={14} color={C.muted} /> Back
          </button>
        </div>
      )}
    </div>
  );
}

// ── WRAPPER IN ANDROID FRAME ───────────────────────────────────────────────
function Root() {
  const [scale, setScale] = React.useState(1);
  const DEVICE_W = 412, DEVICE_H = 892;

  React.useEffect(() => {
    const update = () => {
      const s = Math.min(
        (window.innerWidth - 16) / DEVICE_W,
        (window.innerHeight - 16) / DEVICE_H,
        1
      );
      setScale(s);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0c0c0c' }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center', flexShrink: 0 }}>
        <AndroidDevice dark={true} width={DEVICE_W} height={DEVICE_H}>
          <App />
        </AndroidDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
