services:
  jamarr:
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - /mnt/config/q-dev/jamarr:/app/cache
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8111 --loop asyncio --reload --reload-dir /app/app
    # Don't need to rebuild for backend changes - volume mount + reload handles it

  jamarr_db:
    volumes:
      - /mnt/config/q-dev/jamarr/postgres:/var/lib/postgresql/data

  # Frontend dev server - runs separately with HMR
  jamarr_web:
    image: node:22-slim
    container_name: jamarr_web
    network_mode: "host"
    working_dir: /app/web
    volumes:
      - ./web:/app/web
      # Use named volume for node_modules to avoid conflicts with host
      - jamarr_web_node_modules:/app/web/node_modules
    entrypoint: /bin/sh -c "npm install && npm run dev:host"
    environment:
      - VITE_API_URL=http://127.0.0.1:8111
    restart: unless-stopped

volumes:
  jamarr_web_node_modules:
